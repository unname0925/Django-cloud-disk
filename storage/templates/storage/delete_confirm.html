{% extends "storage/base.html" %}
{% block title %}刪除確認{% endblock %}

{% block content %}
<div class="card">
  <h2>確認刪除</h2>
  <p>你確定要刪除：<strong>{{ file.original_name }}</strong> 嗎？</p>

  <form method="post">
    {% csrf_token %}
    <button type="submit">確定刪除</button>
    <a href="{% url 'dashboard' %}">取消</a>
  </form>
</div>
{% endblock %}
